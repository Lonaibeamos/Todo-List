<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO-LIST (Google Keep Clone)</title>
<link rel="stylesheet" href="style.css">
<script src="./index.js" defer></script>
</head>
<body>
    <div class="main">
        <div class="sidebar">
            <table>
                <tr class="one">
                    <th class="h">
                        <span style="color: #fbbc04; margin-right: 5px;">💡</span>Note Pad
                    </th>
                </tr>
                <tr class="two">
                    <td class="add">✚ Add task</td>
                </tr>
                <tr class="Three">
                  <td class="three">x</td>
                  <td>klkljoij</td>
                </tr>
            </table>
            </div>
            <div class="sidebar2"></div>

<button class="btn" style="width: 100px; height: 40px; margin:0 -100% ; background: khaki; display: inline;">Add Todo</button>
       
<div class="popup">
  <form action="" id="projectForm">
  <h2>create New Project</h2>
  <label for="project">Project Name</label>
  <input type="text" id="project" placeholder="e.g Gym,Poetry, Coding">
  <div class="buttons">
  <input type="reset" value="cancel" id="cancel"></input>
  <input type="submit" value="create Project" id="submit">
  </div>
</form> 
</div>

</div>

<div class="todo">
  <form class="form">
    <div style="display: inline;" >
         <input type="reset" value="cancel" style="width: 50%;">
        <input type="submit" value="submit" style="width: 45%;">
   
    </div>
    <div>
    <label for="title">Title</label>
    <input type="text" required>
    </div>
    <div>
    <label for="description">Description</label>
    <input type="text" id="description" required>
    </div>
    <div>
    <label for="date">Due Date</label>
    <input type="date" id="date">
    </div>
    <div>
    <label for="priority">Priority</label>
    <select name="" id="priority">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high" selected>High</option>
    <option value="urgent">Urgent</option>
    </select>
    </div>
    <div>
    <label for="tags">Tags</label>
    <textarea type="textarea" id="tags"></textarea>
    </div>
  </form>
</div>
</body>
